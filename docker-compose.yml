services:
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    container_name: vivy-comfyui
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - AUTO_UPDATE=false
      - CF_QUICK_TUNNELS=false
      - WEB_ENABLE_AUTH=false
      # Flags passed directly to main.py — listen on all interfaces so the
      # host can reach port 8188
      - COMFYUI_FLAGS=--listen 0.0.0.0
    ports:
      - "8188:8188"
    volumes:
      # :U — Podman chowns the source dir to the container's process uid/gid
      # (uid 1000 / gid 1111) in the rootless user namespace, so the
      # container's non-root 'user' process can write to these bind mounts.
      - ./data/comfyui/models:/opt/ComfyUI/models:U
      - ./data/comfyui/output:/opt/ComfyUI/output:U
      - ./data/comfyui/input:/opt/ComfyUI/input:U
      - ./data/comfyui/user:/opt/ComfyUI/user:U
      - ./data/comfyui/custom_nodes:/opt/ComfyUI/custom_nodes:U
    # CDI passthrough — never use x-podman.cdi_devices here
    devices:
      - nvidia.com/gpu=all
    networks:
      - vivy_vivy-net

# vivy_vivy-net is created by the main Vivy Server stack (podman-compose
# prefixes the project directory name).  If starting fresh:
#   podman network create vivy_vivy-net
networks:
  vivy_vivy-net:
    external: true
